
<style>
.nitem{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.nbar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:20px}
.ntxt{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.nlabel{font-weight:500;color:var(--color-text-primary)}
.accion-item{display:flex;gap:6px;font-size:12px;color:var(--color-text-secondary);padding:2px 0}
.adot{width:4px;height:4px;border-radius:50%;background:var(--color-text-tertiary);margin-top:5px;flex-shrink:0}
</style>

<svg width="100%" viewBox="0 0 680 492">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<g class="node c-gray" onclick="sd('borrador')">
<rect x="120" y="20" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="200" y="42" text-anchor="middle" dominant-baseline="central">Borrador</text>
</g>

<line x1="200" y1="64" x2="200" y2="138" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#a)"/>
<text class="ts" x="208" y="103" dominant-baseline="central" text-anchor="start">envía a revisión</text>

<g class="node c-blue" onclick="sd('revision')">
<rect x="120" y="140" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="200" y="162" text-anchor="middle" dominant-baseline="central">En revisión</text>
</g>

<line x1="280" y1="162" x2="398" y2="162" stroke="#BA7517" stroke-width="1.5" marker-end="url(#a)"/>
<text class="ts" x="339" y="153" text-anchor="middle" dominant-baseline="central">solicita cambios</text>

<g class="node c-coral" onclick="sd('cambios')">
<rect x="400" y="140" width="170" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="485" y="162" text-anchor="middle" dominant-baseline="central">Requiere cambios</text>
</g>

<line x1="400" y1="178" x2="282" y2="178" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#a)"/>
<text class="ts" x="339" y="192" text-anchor="middle" dominant-baseline="central">corrige y reenvía</text>

<line x1="200" y1="184" x2="200" y2="268" stroke="#BA7517" stroke-width="1.5" marker-end="url(#a)"/>
<text class="ts" x="208" y="228" dominant-baseline="central" text-anchor="start">aprueba</text>

<g class="node c-green" onclick="sd('aprobado')">
<rect x="120" y="270" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="200" y="292" text-anchor="middle" dominant-baseline="central">Aprobado</text>
</g>

<line x1="200" y1="314" x2="200" y2="388" stroke="#BA7517" stroke-width="1.5" marker-end="url(#a)"/>
<text class="ts" x="208" y="352" dominant-baseline="central" text-anchor="start">publica el curso</text>

<g class="node c-teal" onclick="sd('publicado')">
<rect x="120" y="390" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="200" y="412" text-anchor="middle" dominant-baseline="central">Publicado</text>
</g>

<line x1="280" y1="412" x2="398" y2="412" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#a)"/>
<text class="ts" x="339" y="403" text-anchor="middle" dominant-baseline="central">registra cambio</text>

<g class="node c-amber" onclick="sd('con_cambios')">
<rect x="400" y="390" width="170" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="485" y="412" text-anchor="middle" dominant-baseline="central">Con cambios</text>
</g>

<line x1="400" y1="428" x2="282" y2="428" stroke="#BA7517" stroke-width="1.5" marker-end="url(#a)"/>
<text class="ts" x="339" y="444" text-anchor="middle" dominant-baseline="central">aprueba cambio</text>

<line x1="28" y1="472" x2="56" y2="472" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#a)"/>
<text class="ts" x="62" y="472" dominant-baseline="central" text-anchor="start">acción del docente</text>
<line x1="210" y1="472" x2="238" y2="472" stroke="#BA7517" stroke-width="1.5" marker-end="url(#a)"/>
<text class="ts" x="244" y="472" dominant-baseline="central" text-anchor="start">acción del jefe de dpto.</text>
<text class="ts" x="430" y="472" dominant-baseline="central" text-anchor="start" opacity=".5">* cambio mayor → reinicia revisión completa</text>
</svg>

<div id="dp" style="margin:10px 0 0;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden">
<div id="dp-hint" style="padding:14px;text-align:center;color:var(--color-text-tertiary);font-size:13px">
Haz clic en un estado para ver acciones y notificaciones
</div>
<div id="dp-body" style="display:none;padding:14px 16px">
<p id="dp-t" style="font-size:15px;font-weight:500;margin:0 0 4px"></p>
<p id="dp-d" style="font-size:13px;color:var(--color-text-secondary);margin:0 0 12px"></p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
<div>
<p style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px">Acciones disponibles</p>
<div id="dp-ac"></div>
</div>
<div>
<p style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px">Notificaciones</p>
<div id="dp-no"></div>
</div>
</div>
<p id="dp-tr" style="font-size:12px;color:var(--color-text-tertiary);margin:12px 0 0;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary)"></p>
</div>
</div>

<script>
const D={
borrador:{t:'Borrador',col:'#9C9A92',
d:'La programación está siendo elaborada por el docente. Solo él tiene acceso; ni el jefe ni el alumnado pueden verla.',
ac:['Editar RA, criterios y unidades de trabajo','Importar PDF del módulo para pre-rellenar campos','Previsualizar el documento antes de enviarlo'],
no:[{rol:'Docente',c:'#7F77DD',msg:'Estado activo: puede editar y enviar cuando lo desee'},{rol:'Jefe',c:'#BA7517',msg:'Sin visibilidad hasta el envío del docente'}],
tr:'Transición de salida: el docente envía la programación → pasa a En revisión.'},
revision:{t:'En revisión',col:'#378ADD',
d:'La programación ha sido enviada al jefe. El docente no puede editarla mientras está pendiente de revisión.',
ac:['Jefe revisa la programación completa','Jefe puede aprobar o devolver con comentario','Docente puede ver el estado pero no editar'],
no:[{rol:'Jefe',c:'#BA7517',msg:'Recibe: "Nueva programación pendiente de revisión – [Módulo] [Grupo]"'},{rol:'Docente',c:'#7F77DD',msg:'Puede monitorizar el estado de su envío'}],
tr:'Transición de salida: jefe aprueba (→ Aprobado) o solicita cambios (→ Requiere cambios).'},
cambios:{t:'Requiere cambios',col:'#D85A30',
d:'El jefe ha detectado aspectos a corregir y devuelve la programación con un comentario específico.',
ac:['Docente lee el comentario detallado del jefe','Docente edita y corrige la programación','El historial de revisiones queda registrado'],
no:[{rol:'Docente',c:'#7F77DD',msg:'Recibe: "Tu programación de [Módulo] requiere cambios – [Comentario del jefe]"'},{rol:'Jefe',c:'#BA7517',msg:'Sin notificación hasta el reenvío del docente'}],
tr:'Transición de salida: el docente corrige y reenvía → vuelve a En revisión.'},
aprobado:{t:'Aprobado',col:'#639922',
d:'El jefe ha validado la programación del módulo. Queda bloqueada para edición hasta que se publique el curso.',
ac:['Docente puede consultar (sin editar) la programación','Jefe puede publicar cuando todos los módulos estén aprobados','El jefe ve el progreso: N de M módulos aprobados'],
no:[{rol:'Docente',c:'#7F77DD',msg:'Recibe: "Tu programación de [Módulo] ha sido aprobada"'},{rol:'Jefe',c:'#BA7517',msg:'Puede publicar el curso cuando el 100% de módulos esté aprobado'}],
tr:'Transición de salida: el jefe lanza la publicación global del curso → pasa a Publicado.'},
publicado:{t:'Publicado',col:'#1D9E75',
d:'La Programación Didáctica del curso es pública. Visible para el alumnado y presentable ante inspección educativa.',
ac:['Alumnado consulta la programación de sus módulos','Docente puede registrar cambios justificados durante el curso','Jefe exporta la programación completa a PDF'],
no:[{rol:'Alumnado',c:'#1D9E75',msg:'Recibe: "Ya puedes consultar la programación de tus módulos"'},{rol:'Docente',c:'#7F77DD',msg:'Recibe: "La Programación Didáctica 2026-2027 ha sido publicada"'},{rol:'Jefe',c:'#BA7517',msg:'Recibe confirmación de publicación exitosa'}],
tr:'Estado definitivo del curso. Cualquier cambio posterior genera trazabilidad y pasa a Con cambios.'},
con_cambios:{t:'Con cambios',col:'#BA7517',
d:'Durante el curso, el docente ha registrado una modificación justificada. Queda pendiente de aprobación por el jefe.',
ac:['Jefe aprueba el cambio menor (→ Publicado, cambio queda en el registro)','Jefe solicita revisión completa si el cambio es mayor (→ En revisión)','El cambio queda firmado con fecha, justificación y autoría'],
no:[{rol:'Jefe',c:'#BA7517',msg:'Recibe: "Cambio registrado en [Módulo] – [Justificación del docente]"'},{rol:'Docente',c:'#7F77DD',msg:'Puede ver el cambio pendiente y su estado de aprobación'}],
tr:'Transición de salida: jefe aprueba cambio menor (→ Publicado) o solicita revisión mayor (→ En revisión).'}
};

function sd(id){
const d=D[id];if(!d)return;
document.getElementById('dp-hint').style.display='none';
document.getElementById('dp-body').style.display='block';
document.getElementById('dp-t').textContent='Estado: '+d.t;
document.getElementById('dp-t').style.color=d.col;
document.getElementById('dp-d').textContent=d.d;
document.getElementById('dp-ac').innerHTML=d.ac.map(x=>`<div class="accion-item"><span class="adot"></span><span>${x}</span></div>`).join('');
document.getElementById('dp-no').innerHTML=d.no.map(x=>`<div class="nitem"><div class="nbar" style="background:${x.c}"></div><div class="ntxt"><span class="nlabel">${x.rol}</span> — ${x.msg}</div></div>`).join('');
document.getElementById('dp-tr').textContent=d.tr;
}
</script>
