<div id="dp" style="margin:8px 0 0;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden">
<div id="dp-hint" style="padding:14px;text-align:center;color:var(--color-text-tertiary);font-size:13px">
Selecciona un componente arriba para explorar su función
</div>
<div id="dp-body" style="display:none;padding:14px 16px">
<p id="dp-t" style="font-size:15px;font-weight:500;margin:0 0 4px;color:var(--color-text-primary)"></p>
<p id="dp-d" style="font-size:13px;color:var(--color-text-secondary);margin:0 0 10px"></p>
<div id="dp-i"></div>
</div>
</div>

<script>
const D={
alumnado:{t:'Rol: Alumnado',d:'Receptor activo de la programación y agente de su propio itinerario formativo.',i:['Consulta programaciones, actividades y calendarios de sus módulos','Seguimiento de su itinerario personal para la empleabilidad (ITK)','Registro y seguimiento de prácticas en empresa (FCT)','Acceso a rúbricas y criterios de evaluación de cada RA','Feedback sobre metodología, recursos y experiencia del módulo']},
profesorado:{t:'Rol: Profesorado',d:'Responsable de diseñar, registrar y actualizar la programación de cada módulo asignado.',i:['Introduce los RA y criterios de evaluación del módulo','Diseña y secuencia las unidades de trabajo (UT)','Define metodología, instrumentos de evaluación y recursos didácticos','Registra el avance real de los RA trabajados en clase','Propone y justifica modificaciones a lo largo del curso']},
jefe:{t:'Rol: Jefe de Departamento',d:'Supervisor y validador con visión global del ciclo. Es quien publica la Programación final del curso.',i:['Configura los grupos del departamento (1º/2º CFGM · 1º/2º CFGS)','Introduce horarios, calendario académico y normativa aplicable','Supervisa y valida las programaciones de cada módulo y docente','Verifica la coherencia transversal del ciclo completo','Aprueba los proyectos intermodulares del departamento','Publica la Programación Didáctica oficial del curso']},
'alta-a':{t:'Alta: Perfil académico del alumnado',d:'Cuestionario de incorporación con los datos educativos mínimos del alumno o alumna.',i:['Datos personales y vía de acceso al ciclo formativo','Formación previa y titulación de acceso','Situación laboral o experiencia profesional relacionada','Necesidades educativas específicas (ACNEAE) si procede','Disponibilidad horaria y preferencias para la FCT']},
'alta-p':{t:'Alta: Datos del módulo (Profesorado)',d:'El docente carga la información estructurada del módulo que impartirá este curso académico.',i:['Módulo(s) asignado(s) y grupo(s) de impartición','Resultados de aprendizaje (RA) del módulo según normativa','Criterios de evaluación asociados a cada RA','Carga horaria semanal y total del módulo','Recursos y equipamiento disponible en el centro','Instrumentos de evaluación previstos (rúbricas, pruebas, proyectos)']},
'alta-j':{t:'Alta: Gestión del ciclo (Jefe de Dpto.)',d:'Configuración del marco organizativo y normativo del departamento para el curso.',i:['Grupos del ciclo y número de alumnos por grupo','Asignación de módulos a docentes y distribución horaria','Calendario del curso: festivos, evaluaciones y períodos FCT','Normativa vigente: RD 1579/2011, LOMLOE/LOOIFP, orden canaria','Acuerdos pedagógicos del departamento (metodología, criterios comunes)']},
curriculo:{t:'Módulo: Gestión curricular',d:'Núcleo del sistema. Gestiona la relación entre RA, criterios, UT, instrumentos y evidencias de evaluación.',i:['Vinculación RA ↔ criterios de evaluación ↔ instrumentos','Diseño y secuenciación de unidades de trabajo (UT)','Rúbricas de evaluación editables por criterio','Registro de actividades, tareas y proyectos por UT','Seguimiento del avance de cada RA a lo largo del curso','Autogeneración de secciones 4, 8 y 10 del índice de programación']},
transversal:{t:'Módulo: Transversalidad',d:'Verifica y reporta la cobertura de los elementos transversales obligatorios en todos los módulos del ciclo.',i:['Mapa de cobertura de PRL: qué módulos y UT la trabajan','Digitalización aplicada: catálogo de proyectos y actividades digitales','Sostenibilidad: registro de actividades con perspectiva ambiental','Igualdad y diversidad: revisión del tratamiento en programaciones','Alerta de elementos sin cobertura suficiente en el ciclo','Informe exportable de transversalidad para el jefe de departamento']},
coord:{t:'Módulo: Coordinación del Departamento',d:'Panel de control del jefe de departamento para supervisar, coordinar y publicar todas las programaciones.',i:['Estado en tiempo real de cada programación (borrador / revisión / publicado)','Registro de cambios justificados con fecha y autoría','Gestión de proyectos intermodulares entre módulos del ciclo','Herramienta de coherencia: detecta solapamientos y vacíos pedagógicos','Exportación de la Programación completa del departamento']},
prog:{t:'Salida: Programación Didáctica 2026-2027',d:'Documento vivo que recoge la programación completa del departamento según el índice normativo de 17 secciones.',i:['Estructura completa del índice normativo (portada → bibliografía)','Actualización continua con trazabilidad de todos los cambios del curso','Versiones independientes por grupo (1º/2º CFGM · 1º/2º CFGS)','Exportación a PDF para dirección e inspección educativa','Memoria de fin de curso autogenerada desde los registros del sistema']}
};
function sd(id){
const d=D[id];if(!d)return;
document.getElementById('dp-hint').style.display='none';
document.getElementById('dp-body').style.display='block';
document.getElementById('dp-t').textContent=d.t;
document.getElementById('dp-d').textContent=d.d;
document.getElementById('dp-i').innerHTML=d.i.map(x=>`<div class="dpi"><span class="dpdot"></span><span>${x}</span></div>`).join('');
}
</script>
